name: ROS 2 CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    name: ${{ matrix.ros_distro }}
    runs-on: ubuntu-24.04
    container: ${{ matrix.container }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - ros_distro: humble
            container: ubuntu:jammy
          - ros_distro: jazzy
            container: ubuntu:noble
          - ros_distro: kilted
            container: ubuntu:noble
          - ros_distro: lyrical
            container: ubuntu:resolute
          - ros_distro: rolling
            container: ubuntu:resolute

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install ROS 2 ${{ matrix.ros_distro }}
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: ${{ matrix.ros_distro }}
          use-ros2-testing: ${{ matrix.ros_distro == 'rolling' }}

      - name: Install dependencies
        shell: bash
        run: |
          for attempt in 1 2 3; do
            if rosdep update; then
              break
            fi
            if [ "${attempt}" -eq 3 ]; then
              exit 1
            fi
          done
          rosdep install \
            --from-paths . \
            --ignore-src \
            --rosdistro "${{ matrix.ros_distro }}" \
            -r -y

      - name: Check xacro files
        shell: bash
        run: |
          source "/opt/ros/${{ matrix.ros_distro }}/setup.bash"
          PYTHONPYCACHEPREFIX=/tmp/robstride_pycache python3 -m compileall -q \
            robstride_examples/launch
          xacro robstride_examples/description/robstride_motor_profiles.xacro \
            > /tmp/robstride_motor_profiles.urdf
          xacro robstride_examples/description/robstride_example.urdf.xacro \
            > /tmp/robstride_example.urdf
          xacro robstride_examples/test/test_motor_profiles.urdf.xacro \
            > /tmp/robstride_profile_test.urdf

      - name: Check package set
        shell: bash
        run: |
          source "/opt/ros/${{ matrix.ros_distro }}/setup.bash"
          expected="robstride_driver
          robstride_examples
          robstride_ros2
          robstride_ros2_control"
          actual="$(colcon list --base-paths . --names-only | sort)"
          test "${actual}" = "${expected}"

      - name: Build
        shell: bash
        run: |
          source "/opt/ros/${{ matrix.ros_distro }}/setup.bash"
          colcon build \
            --base-paths . \
            --event-handlers console_cohesion+

      - name: Check installed resources
        shell: bash
        run: |
          source "/opt/ros/${{ matrix.ros_distro }}/setup.bash"
          source install/setup.bash
          ros2 pkg prefix robstride_driver
          ros2 pkg prefix robstride_ros2_control
          ros2 pkg prefix robstride_examples
          ros2 pkg prefix robstride_ros2
          xacro "$(ros2 pkg prefix robstride_examples)/share/robstride_examples/description/robstride_example.urdf.xacro" \
            > /tmp/robstride_installed_example.urdf

      - name: Test
        shell: bash
        run: |
          source "/opt/ros/${{ matrix.ros_distro }}/setup.bash"
          source install/setup.bash
          colcon test \
            --base-paths . \
            --event-handlers console_cohesion+
          colcon test-result --verbose
